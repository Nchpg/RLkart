services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rlkart-backend
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rlkart-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
